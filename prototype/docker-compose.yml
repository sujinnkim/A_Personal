version: '3.9'

# ================================================================
# 미팅 포털 프로토타입 — Docker Compose
# 검증 항목: IV-01~IV-04
#
# 사용법:
#   docker compose up -d                         # 기본 실행
#   docker compose --profile monitoring up -d    # + Prometheus/Grafana
# ================================================================

networks:
  meeting-net:
    driver: bridge

volumes:
  mariadb-primary-data:
  mariadb-replica-data:
  redis-data:
  prometheus-data:
  grafana-data:

services:

  # ── MariaDB Primary ────────────────────────────────────────────
  mariadb-primary:
    image: mariadb:10.11
    container_name: mariadb-primary
    networks: [meeting-net]
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: meetingdb
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
      MARIADB_REPLICATION_MODE: master
      MARIADB_REPLICATION_USER: repl
      MARIADB_REPLICATION_PASSWORD: replpass
    ports:
      - "3306:3306"
    volumes:
      - mariadb-primary-data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=500
      --innodb_buffer_pool_size=512M
      --log-bin=mysql-bin
      --server-id=1
      --binlog-format=ROW
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── MariaDB Replica (QueryPool 대상) ──────────────────────────
  mariadb-replica:
    image: mariadb:10.11
    container_name: mariadb-replica
    networks: [meeting-net]
    depends_on:
      mariadb-primary:
        condition: service_healthy
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: meetingdb
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
      MARIADB_REPLICATION_MODE: slave
      MARIADB_REPLICATION_USER: repl
      MARIADB_REPLICATION_PASSWORD: replpass
      MARIADB_MASTER_HOST: mariadb-primary
    ports:
      - "3307:3306"
    volumes:
      - mariadb-replica-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=300
      --innodb_buffer_pool_size=256M
      --read-only=ON
      --server-id=2
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    networks: [meeting-net]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Stub Server ────────────────────────────────────────────────
  stub-server:
    build:
      context: ./stub-server
      dockerfile: Dockerfile
    container_name: stub-server
    networks: [meeting-net]
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Front API ──────────────────────────────────────────────────
  front-api:
    build:
      context: ./front-api
      dockerfile: Dockerfile
    container_name: front-api
    networks: [meeting-net]
    depends_on:
      mariadb-primary:
        condition: service_healthy
      mariadb-replica:
        condition: service_healthy
      redis:
        condition: service_healthy
      stub-server:
        condition: service_healthy
    environment:
      DB_PRIMARY_HOST: mariadb-primary
      DB_PRIMARY_PORT: 3306
      DB_REPLICA_HOST: mariadb-replica
      DB_REPLICA_PORT: 3306
      DB_NAME: meetingdb
      DB_USER: app
      DB_PASSWORD: apppass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MEETING_MANAGER_URL: http://stub-server:8090
      AC_SERVER_URL: http://stub-server:8090
      COPILOT_ADMIN_URL: http://stub-server:8090
    ports:
      - "8080:8080"
      - "8081:8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Nginx (AS-04 Connector 분리) ──────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    networks: [meeting-net]
    depends_on:
      front-api:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Prometheus (monitoring profile) ──────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    profiles: [monitoring]
    networks: [meeting-net]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'

  # ── Grafana (monitoring profile) ──────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    profiles: [monitoring]
    networks: [meeting-net]
    depends_on: [prometheus]
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
