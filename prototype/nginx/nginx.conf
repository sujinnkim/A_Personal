worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" upstream=$upstream_addr '
                      'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    sendfile        on;
    keepalive_timeout 65;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;

    # AS-04: 입장 전용 경로 → 8081 Connector
    upstream front_api_entry {
        server front-api:8081;
        keepalive 32;
    }

    # 일반 경로 → 8080 Connector
    upstream front_api_general {
        server front-api:8080;
        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        # 헬스체크
        location /health {
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # AS-04: 입장 전용 라우팅 → 8081 (JoinPool)
        location ~ ^/meetings/[^/]+/join {
            proxy_pass http://front_api_entry;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location ~ ^/meetings/[^/]+/conference-token {
            proxy_pass http://front_api_entry;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 일반 API → 8080 (ServicePool / QueryPool / GeneralPool)
        location / {
            proxy_pass http://front_api_general;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
