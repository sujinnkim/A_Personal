global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'front-api'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['front-api:8080']
    scrape_interval: 10s

  - job_name: 'stub-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['stub-server:8090']
    scrape_interval: 30s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
